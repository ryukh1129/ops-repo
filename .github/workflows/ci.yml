name: CI
on:
  - push
  - pull_request

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install yamllint
        run: python -m pip install --user yamllint
      - name: Run yamllint on workflows
        run: yamllint -c .yamllint.yml .github/workflows
